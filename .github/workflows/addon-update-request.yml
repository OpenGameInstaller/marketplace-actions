name: Addon marketplace requests

on:
  issues:
    types: [opened, edited, labeled]

permissions:
  contents: write
  issues: write
  discussions: write
  pages: write
  id-token: write

jobs:
  reject-banned-addon-request:
    if: >-
      github.event_name == 'issues' &&
      !contains(github.event.issue.labels.*.name, 'addon-update') &&
      (contains(github.event.issue.labels.*.name, 'addon-create') || contains(github.event.issue.labels.*.name, 'addon-creation'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Close banned addon requesters
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const policy = JSON.parse(fs.readFileSync('.github/addon-request-policy.json', 'utf8'));
            const user = context.payload.issue.user.login;
            if (!(policy.bannedUsers || []).includes(user)) return;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `🚫 @${user} is banned from addon creation/update requests in this repository.`,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              state: 'closed',
              state_reason: 'not_planned',
            });

  validate-request:
    if: >-
      github.event_name == 'issues' &&
      contains(github.event.issue.labels.*.name, 'addon-update')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate request and comment
        uses: actions/github-script@v7
        with:
          script: |
            const { validate } = require('./scripts/addon-request.cjs');
            const fs = require('fs');
            const issue = context.payload.issue;
            const policy = JSON.parse(fs.readFileSync('.github/addon-request-policy.json', 'utf8'));
            const user = issue.user.login;
            const result = validate(issue.body || '', {
              user,
              userId: issue.user.id,
              banned: (policy.bannedUsers || []).includes(user),
              trusted: (policy.trustedUsers || []).includes(user),
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: result.summary,
            });

            if (context.payload.action === 'opened' && result.addon?.discussion?.id) {
              const discussionBody = [
                `📬 Update requested by @${user} in #${issue.number}.`,
                '',
                `**Requested target:** ${result.payload.targetRef || 'latest created tag on approval'}`,
                `**Validation:** ${result.errors.length ? 'failed' : 'passed'}`,
                result.errors.length ? `**Errors:**\n${result.errors.map((error) => `- ${error}`).join('\n')}` : '',
              ].filter(Boolean).join('\n');

              await github.graphql(`
                mutation($discussionId: ID!, $body: String!) {
                  addDiscussionComment(input: { discussionId: $discussionId, body: $body }) {
                    comment { id }
                  }
                }
              `, { discussionId: result.addon.discussion.id, body: discussionBody });
            }

            if ((policy.bannedUsers || []).includes(user)) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'not_planned',
              });
            }

  validate-create-request:
    if: >-
      github.event_name == 'issues' &&
      contains(github.event.issue.labels.*.name, 'addon-create')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate submission and comment
        uses: actions/github-script@v7
        with:
          script: |
            const { validateCreate } = require('./scripts/addon-request.cjs');
            const fs = require('fs');
            const issue = context.payload.issue;
            const policy = JSON.parse(fs.readFileSync('.github/addon-request-policy.json', 'utf8'));
            const user = issue.user.login;
            const result = validateCreate(issue.body || '', {
              user,
              banned: (policy.bannedUsers || []).includes(user),
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: result.summary,
            });

            if ((policy.bannedUsers || []).includes(user)) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'not_planned',
              });
            }

  manage-request-users:
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request == null &&
      (startsWith(github.event.comment.body, '/ban') || startsWith(github.event.comment.body, '/trust'))
    runs-on: ubuntu-latest
    steps:
      - name: Check moderator permission
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.payload.comment.user.login,
            });
            if (!['admin', 'maintain', 'write'].includes(data.permission)) {
              core.setFailed(`@${context.payload.comment.user.login} has ${data.permission} permission; write access is required.`);
            }

      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update request policy
        id: policy
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = '.github/addon-request-policy.json';
            const policy = fs.existsSync(path) ? JSON.parse(fs.readFileSync(path, 'utf8')) : {};
            policy.bannedUsers ||= [];
            policy.trustedUsers ||= [];

            const body = context.payload.comment.body.trim();
            const command = body.startsWith('/ban') ? 'ban' : 'trust';
            const mention = body.match(/@([A-Za-z0-9-]+)/)?.[1];
            const user = mention || context.payload.issue.user.login;

            if (command === 'ban') {
              if (!policy.bannedUsers.includes(user)) policy.bannedUsers.push(user);
              policy.trustedUsers = policy.trustedUsers.filter((entry) => entry !== user);
            } else {
              if (!policy.trustedUsers.includes(user)) policy.trustedUsers.push(user);
              policy.bannedUsers = policy.bannedUsers.filter((entry) => entry !== user);
            }

            policy.bannedUsers.sort((a, b) => a.localeCompare(b));
            policy.trustedUsers.sort((a, b) => a.localeCompare(b));
            fs.writeFileSync(path, `${JSON.stringify(policy, null, 2)}\n`);
            core.setOutput('command', command);
            core.setOutput('user', user);

      - name: Commit request policy
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/addon-request-policy.json
          if git diff --cached --quiet; then
            echo "Policy already up to date."
            exit 0
          fi
          git commit -m "chore(addon requests): ${{ steps.policy.outputs.command }} ${{ steps.policy.outputs.user }}"
          git push

      - name: Check current trusted request
        id: trusted_current
        uses: actions/github-script@v7
        with:
          script: |
            const { validate } = require('./scripts/addon-request.cjs');
            const command = '${{ steps.policy.outputs.command }}';
            const user = '${{ steps.policy.outputs.user }}';
            const isAddonUpdate = context.payload.issue.labels.some((label) => label.name === 'addon-update');
            const isIssueCreator = user === context.payload.issue.user.login;
            const result = validate(context.payload.issue.body || '', { user, userId: context.payload.issue.user.id, trusted: true, banned: false });
            core.setOutput('apply', String(command === 'trust' && isAddonUpdate && isIssueCreator && result.errors.length === 0));

      - name: Apply current trusted update
        if: steps.trusted_current.outputs.apply == 'true'
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_LABELS: ${{ join(github.event.issue.labels.*.name, ',') }}
          ADDON_REQUESTER_ID: ${{ github.event.issue.user.id }}
        run: node scripts/addon-request.cjs apply-by-label

      - name: Commit current trusted update
        if: steps.trusted_current.outputs.apply == 'true'
        run: |
          node scripts/update-addon-issue-template.mjs
          node scripts/sync-pages-api.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add marketplace.json api/marketplace.json .github/ISSUE_TEMPLATE/addon-update.yml
          git commit -m "chore(addons): trust and approve update from issue #${{ github.event.issue.number }}"
          git push

      - uses: actions/configure-pages@v5
        if: steps.trusted_current.outputs.apply == 'true'

      - uses: actions/upload-pages-artifact@v3
        if: steps.trusted_current.outputs.apply == 'true'
        with:
          path: _site

      - name: Deploy GitHub Pages
        if: steps.trusted_current.outputs.apply == 'true'
        uses: actions/deploy-pages@v4

      - name: Comment and close if needed
        uses: actions/github-script@v7
        with:
          script: |
            const command = '${{ steps.policy.outputs.command }}';
            const user = '${{ steps.policy.outputs.user }}';
            const applied = '${{ steps.trusted_current.outputs.apply }}' === 'true';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: command === 'ban'
                ? `🚫 @${user} is now banned from addon creation/update requests in this repository.`
                : (applied
                  ? `✅ @${user} is now trusted, and this addon update was automatically approved and applied.`
                  : `✅ @${user} is now trusted; their addon update requests will be approved automatically.`),
            });
            if (command === 'ban' || applied) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                state: 'closed',
                state_reason: command === 'ban' ? 'not_planned' : undefined,
              });
            }

  bump-request:
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request == null &&
      (contains(github.event.issue.labels.*.name, 'addon-update') || contains(github.event.issue.labels.*.name, 'addon-create')) &&
      startsWith(github.event.comment.body, '/bump')
    runs-on: ubuntu-latest
    steps:
      - name: Check bump requester
        uses: actions/github-script@v7
        with:
          script: |
            if (context.payload.comment.user.login !== context.payload.issue.user.login) {
              core.setFailed('Only the issue creator can use /bump.');
            }

      - uses: actions/checkout@v4

      - name: Check requester is not banned
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const policy = JSON.parse(fs.readFileSync('.github/addon-request-policy.json', 'utf8'));
            const user = context.payload.issue.user.login;
            if ((policy.bannedUsers || []).includes(user)) {
              core.setFailed(`@${user} is banned from addon requests.`);
            }

      - name: Update issue target ref
        uses: actions/github-script@v7
        with:
          script: |
            const { replaceTargetRef } = require('./scripts/addon-request.cjs');
            const requested = context.payload.comment.body.trim().replace(/^\/bump\s*/i, '').trim();
            const body = replaceTargetRef(context.payload.issue.body || '', requested);
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body,
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `🔁 Requested target ref bumped to \`${requested}\`.`,
            });

  auto-approve-trusted-request:
    if: >-
      github.event_name == 'issues' &&
      contains(github.event.issue.labels.*.name, 'addon-update')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check trust and validation
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { validate } = require('./scripts/addon-request.cjs');
            const policy = JSON.parse(fs.readFileSync('.github/addon-request-policy.json', 'utf8'));
            const user = context.payload.issue.user.login;
            const trusted = (policy.trustedUsers || []).includes(user);
            const banned = (policy.bannedUsers || []).includes(user);
            const result = validate(context.payload.issue.body || '', { user, userId: context.payload.issue.user.id, trusted, banned });
            core.setOutput('apply', String(trusted && !banned && result.errors.length === 0));
            core.setOutput('discussion_id', result.addon?.discussion?.id || '');

      - name: Apply trusted marketplace update
        if: steps.check.outputs.apply == 'true'
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_LABELS: ${{ join(github.event.issue.labels.*.name, ',') }}
          ADDON_REQUESTER_ID: ${{ github.event.issue.user.id }}
        run: node scripts/addon-request.cjs apply-by-label

      - name: Commit trusted marketplace update
        if: steps.check.outputs.apply == 'true'
        run: |
          node scripts/update-addon-issue-template.mjs
          node scripts/sync-pages-api.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add marketplace.json api/marketplace.json .github/ISSUE_TEMPLATE/addon-update.yml
          git commit -m "chore(addons): auto-approve trusted update from issue #${{ github.event.issue.number }}"
          git push

      - uses: actions/configure-pages@v5
        if: steps.check.outputs.apply == 'true'

      - uses: actions/upload-pages-artifact@v3
        if: steps.check.outputs.apply == 'true'
        with:
          path: _site

      - name: Deploy GitHub Pages
        if: steps.check.outputs.apply == 'true'
        uses: actions/deploy-pages@v4

      - name: Post trusted update approval to discussion
        if: steps.check.outputs.apply == 'true' && steps.check.outputs.discussion_id != ''
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '✅ Addon update automatically approved for trusted requester.',
              '',
              `Issue: #${context.payload.issue.number}`,
            ].join('\n');

            await github.graphql(`
              mutation($discussionId: ID!, $body: String!) {
                addDiscussionComment(input: { discussionId: $discussionId, body: $body }) {
                  comment { id }
                }
              }
            `, { discussionId: '${{ steps.check.outputs.discussion_id }}', body });

      - name: Comment and close trusted request
        if: steps.check.outputs.apply == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: '✅ Trusted requester update was automatically approved and applied.',
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              state: 'closed',
            });

  approve-request:
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request == null &&
      (contains(github.event.issue.labels.*.name, 'addon-update') || contains(github.event.issue.labels.*.name, 'addon-create')) &&
      startsWith(github.event.comment.body, '/approve')
    runs-on: ubuntu-latest
    steps:
      - name: Check approver permission
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.payload.comment.user.login,
            });
            const allowed = ['admin', 'maintain', 'write'];
            if (!allowed.includes(data.permission)) {
              core.setFailed(`@${context.payload.comment.user.login} has ${data.permission} permission; write access is required.`);
            }

      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check requester is not banned
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const policy = JSON.parse(fs.readFileSync('.github/addon-request-policy.json', 'utf8'));
            const user = context.payload.issue.user.login;
            if ((policy.bannedUsers || []).includes(user)) {
              core.setFailed(`@${user} is banned from addon requests.`);
            }

      - name: Update marketplace file
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_LABELS: ${{ join(github.event.issue.labels.*.name, ',') }}
          ADDON_REQUESTER_ID: ${{ github.event.issue.user.id }}
        run: node scripts/addon-request.cjs apply-by-label

      - name: Commit marketplace update
        run: |
          node scripts/update-addon-issue-template.mjs
          node scripts/sync-pages-api.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add marketplace.json api/marketplace.json .github/ISSUE_TEMPLATE/addon-update.yml
          git commit -m "chore(addons): approve marketplace request from issue #${{ github.event.issue.number }}"
          git push

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy GitHub Pages
        uses: actions/deploy-pages@v4

      - name: Comment and close issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: '✅ Approved and applied. The marketplace file was updated, and deployment should start from the pushed commit.',
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              state: 'closed',
            });
