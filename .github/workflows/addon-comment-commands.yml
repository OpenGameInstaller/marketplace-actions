name: Addon comment commands
run-name: ${{ github.event.comment.body }} on #${{ github.event.issue.number }}

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  discussions: write
  pages: write
  id-token: write

jobs:
  handle-command:
    if: github.event.issue.pull_request == null
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare command
        id: command
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { validateUpdate, replaceTargetRef, replaceIssueField, inferRequestType, findAddonForUpdate } = require('./scripts/addon-request.cjs');

            const body = (context.payload.comment.body || '').trim();
            const issueBody = context.payload.issue.body || '';
            const command = body.split(/\s+/)[0].toLowerCase();
            const labels = context.payload.issue.labels.map((label) => label.name);
            const requestType = inferRequestType(issueBody, labels);
            const isMarketplaceIssue = Boolean(requestType);
            const issueUser = context.payload.issue.user.login;
            const commenter = context.payload.comment.user.login;
            const policyPath = '.github/addon-request-policy.json';
            const policy = fs.existsSync(policyPath) ? JSON.parse(fs.readFileSync(policyPath, 'utf8')) : {};
            policy.bannedUsers ||= [];
            policy.trustedUsers ||= [];

            async function requireWritePermission() {
              const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: commenter,
              });
              if (!['admin', 'maintain', 'write'].includes(data.permission)) {
                core.setFailed(`@${commenter} has ${data.permission} permission; write access is required.`);
                return false;
              }
              return true;
            }

            core.setOutput('command', command);
            core.setOutput('apply', 'false');
            core.setOutput('commit_policy', 'false');
            core.setOutput('close', 'false');
            core.setOutput('message', '');
            core.setOutput('request_type', requestType);
            const addonForUpdate = requestType === 'update' ? findAddonForUpdate(issueBody) : undefined;
            core.setOutput('discussion_id', addonForUpdate?.discussion?.id || '');

            const metadataCommands = {
              '/set-name': { field: 'name', label: 'addon name' },
              '/set-author': { field: 'author', label: 'author' },
              '/set-description': { field: 'description', label: 'description' },
              '/set-repository': { field: 'repository', label: 'repository URL' },
              '/set-image': { field: 'image', label: 'image URL' },
            };

            if (!['/approve', '/deny', '/ban', '/trust', '/bump', ...Object.keys(metadataCommands)].includes(command)) {
              core.notice('No addon command found; ignoring comment.');
              return;
            }

            if (!isMarketplaceIssue) {
              core.setFailed(`${command} can only be used on addon marketplace issues.`);
              return;
            }

            if (command === '/ban' || command === '/trust' || command === '/approve' || command === '/deny') {
              if (!(await requireWritePermission())) return;
            }

            if (command === '/ban' || command === '/trust') {
              const mention = body.match(/@([A-Za-z0-9-]+)/)?.[1];
              const user = mention || issueUser;

              if (command === '/ban') {
                if (!policy.bannedUsers.includes(user)) policy.bannedUsers.push(user);
                policy.trustedUsers = policy.trustedUsers.filter((entry) => entry !== user);
                core.setOutput('message', `@${user} can no longer open addon creation or update requests in this repository.`);
                core.setOutput('close', 'true');
              } else {
                if (!policy.trustedUsers.includes(user)) policy.trustedUsers.push(user);
                policy.bannedUsers = policy.bannedUsers.filter((entry) => entry !== user);
                core.setOutput('message', `@${user} is now trusted. Their valid addon update requests can be applied automatically.`);

                const canApplyCurrent = requestType === 'update' && user === issueUser;
                if (canApplyCurrent) {
                  const result = validateUpdate(issueBody, { user, userId: context.payload.issue.user.id, trusted: true, banned: false });
                  if (result.errors.length === 0) {
                    core.setOutput('apply', 'true');
                    core.setOutput('close', 'true');
                    core.setOutput('message', `@${user} is now trusted, and this addon update was approved and applied.`);
                  }
                }
              }

              policy.bannedUsers.sort((a, b) => a.localeCompare(b));
              policy.trustedUsers.sort((a, b) => a.localeCompare(b));
              fs.writeFileSync(policyPath, `${JSON.stringify(policy, null, 2)}\n`);
              core.setOutput('commit_policy', 'true');
              return;
            }

            if (policy.bannedUsers.includes(issueUser)) {
              core.setFailed(`@${issueUser} is banned from addon requests.`);
              return;
            }

            async function commenterCanEditIssue() {
              if (commenter === issueUser) return true;
              if (addonForUpdate?.submittedBy?.login === commenter) return true;
              if (String(addonForUpdate?.submittedBy?.id || '') === String(context.payload.comment.user.id || '')) return true;

              const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: commenter,
              });
              return ['admin', 'maintain', 'write'].includes(data.permission);
            }

            if (command === '/bump' || metadataCommands[command]) {
              if (!(await commenterCanEditIssue())) {
                core.setFailed('Only the issue creator, addon owner, or a maintainer can update request details.');
                return;
              }

              const metadata = metadataCommands[command];
              const requested = body.replace(new RegExp(`^${command}\\s*`, 'i'), '').trim();
              const nextBody = command === '/bump'
                ? replaceTargetRef(issueBody, requested)
                : replaceIssueField(issueBody, metadata.field, requested);
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                body: nextBody,
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                body: command === '/bump'
                  ? `Thanks, I updated the requested target to \`${requested}\`.`
                  : `Thanks, I updated the ${metadata.label} on this request.`,
              });
              return;
            }

            if (command === '/approve') {
              core.setOutput('apply', 'true');
              core.setOutput('close', 'true');
              core.setOutput('message', 'Approved and applied. Thanks for contributing to the OpenGameInstaller addon marketplace. The public marketplace file will update after GitHub Pages finishes deploying.');
            }

            if (command === '/deny') {
              const reason = body.replace(/^\/deny\s*/i, '').trim();
              core.setOutput('close', 'true');
              core.setOutput('message', reason
                ? `A maintainer closed this request.\n\n**Reason:** ${reason}`
                : 'A maintainer closed this request.');
            }

      - name: Commit request policy
        if: steps.command.outputs.commit_policy == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/addon-request-policy.json
          if git diff --cached --quiet; then
            echo "Policy already up to date."
            exit 0
          fi
          git commit -m "chore(addon requests): update trust policy"
          git push

      - name: Create addon discussion
        id: discussion
        if: steps.command.outputs.apply == 'true' && steps.command.outputs.request_type == 'create'
        uses: actions/github-script@v7
        with:
          script: |
            const { parseCreatePayload } = require('./scripts/addon-request.cjs');
            const payload = parseCreatePayload(context.payload.issue.body || '');

            const repoData = await github.graphql(`
              query($owner: String!, $repo: String!) {
                repository(owner: $owner, name: $repo) {
                  id
                  discussionCategories(first: 25) {
                    nodes { id name slug }
                  }
                }
              }
            `, { owner: context.repo.owner, repo: context.repo.repo });

            const categories = repoData.repository.discussionCategories.nodes;
            const category = categories.find((entry) => ['addons', 'addon', 'show-and-tell', 'announcements', 'general'].includes(entry.slug)) || categories[0];
            if (!category) throw new Error('No GitHub Discussions category found. Enable Discussions and create at least one category.');

            const body = [
              `Addon submitted by @${context.payload.issue.user.login} via #${context.payload.issue.number}.`,
              '',
              `**Repository:** ${payload.source}`,
              `**Author:** ${payload.author}`,
              `**Pinned target:** ${payload.targetRef || 'latest created tag resolved during approval'}`,
              '',
              '## Description',
              payload.description,
            ].join('\n');

            const result = await github.graphql(`
              mutation($repositoryId: ID!, $categoryId: ID!, $title: String!, $body: String!) {
                createDiscussion(input: { repositoryId: $repositoryId, categoryId: $categoryId, title: $title, body: $body }) {
                  discussion { id url number }
                }
              }
            `, {
              repositoryId: repoData.repository.id,
              categoryId: category.id,
              title: `Addon: ${payload.name}`,
              body,
            });

            core.setOutput('id', result.createDiscussion.discussion.id);
            core.setOutput('url', result.createDiscussion.discussion.url);
            core.setOutput('number', String(result.createDiscussion.discussion.number));

      - name: Apply marketplace change
        if: steps.command.outputs.apply == 'true'
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_LABELS: ${{ join(github.event.issue.labels.*.name, ',') }}
          ADDON_REQUESTER_ID: ${{ github.event.issue.user.id }}
          ADDON_SUBMITTER_ID: ${{ github.event.issue.user.id }}
          ADDON_SUBMITTER_LOGIN: ${{ github.event.issue.user.login }}
          ADDON_DISCUSSION_ID: ${{ steps.discussion.outputs.id }}
          ADDON_DISCUSSION_URL: ${{ steps.discussion.outputs.url }}
        run: node scripts/addon-request.cjs apply-by-label

      - name: Commit marketplace change
        if: steps.command.outputs.apply == 'true'
        run: |
          node scripts/update-addon-issue-template.mjs
          node scripts/sync-pages-api.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add marketplace.json api/marketplace.json .github/ISSUE_TEMPLATE/addon-update.yml
          git commit -m "chore(addons): apply marketplace request from issue #${{ github.event.issue.number }}"
          git push

      - uses: actions/configure-pages@v5
        if: steps.command.outputs.apply == 'true'

      - uses: actions/upload-pages-artifact@v3
        if: steps.command.outputs.apply == 'true'
        with:
          path: _site

      - name: Deploy GitHub Pages
        id: deployment
        if: steps.command.outputs.apply == 'true'
        uses: actions/deploy-pages@v4

      - name: Post update decision to discussion
        if: steps.command.outputs.request_type == 'update' && steps.command.outputs.discussion_id != '' && (steps.command.outputs.command == '/approve' || steps.command.outputs.command == '/deny')
        uses: actions/github-script@v7
        env:
          COMMAND_MESSAGE: ${{ steps.command.outputs.message }}
        with:
          script: |
            const status = '${{ steps.command.outputs.command }}' === '/approve' ? 'approved' : 'denied';
            const body = [
              status === 'approved' ? 'Addon update approved.' : 'Addon update closed.',
              '',
              process.env.COMMAND_MESSAGE,
              '',
              `Issue: #${context.payload.issue.number}`,
            ].join('\n');

            await github.graphql(`
              mutation($discussionId: ID!, $body: String!) {
                addDiscussionComment(input: { discussionId: $discussionId, body: $body }) {
                  comment { id }
                }
              }
            `, { discussionId: '${{ steps.command.outputs.discussion_id }}', body });

      - name: Comment and close
        if: steps.command.outputs.message != ''
        uses: actions/github-script@v7
        with:
          script: |
            const pageUrl = '${{ steps.deployment.outputs.page_url }}';
            const deploymentNote = pageUrl ? `\n\nUpdated marketplace file: ${pageUrl}api/marketplace.json` : '';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `${{ steps.command.outputs.message }}${deploymentNote}`,
            });
            if ('${{ steps.command.outputs.close }}' === 'true') {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                state: 'closed',
              });
            }
