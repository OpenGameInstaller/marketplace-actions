name: Addon comment commands

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

jobs:
  handle-command:
    if: github.event.issue.pull_request == null
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare command
        id: command
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { validateUpdate, replaceTargetRef, inferRequestType } = require('./scripts/addon-request.cjs');

            const body = (context.payload.comment.body || '').trim();
            const issueBody = context.payload.issue.body || '';
            const command = body.split(/\s+/)[0].toLowerCase();
            const labels = context.payload.issue.labels.map((label) => label.name);
            const requestType = inferRequestType(issueBody, labels);
            const isMarketplaceIssue = Boolean(requestType);
            const issueUser = context.payload.issue.user.login;
            const commenter = context.payload.comment.user.login;
            const policyPath = '.github/addon-request-policy.json';
            const policy = fs.existsSync(policyPath) ? JSON.parse(fs.readFileSync(policyPath, 'utf8')) : {};
            policy.bannedUsers ||= [];
            policy.trustedUsers ||= [];

            async function requireWritePermission() {
              const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: commenter,
              });
              if (!['admin', 'maintain', 'write'].includes(data.permission)) {
                core.setFailed(`@${commenter} has ${data.permission} permission; write access is required.`);
                return false;
              }
              return true;
            }

            core.setOutput('command', command);
            core.setOutput('apply', 'false');
            core.setOutput('commit_policy', 'false');
            core.setOutput('close', 'false');
            core.setOutput('message', '');

            if (!['/approve', '/ban', '/trust', '/bump'].includes(command)) {
              core.notice('No addon command found; ignoring comment.');
              return;
            }

            if (!isMarketplaceIssue) {
              core.setFailed(`${command} can only be used on addon marketplace issues.`);
              return;
            }

            if (command === '/ban' || command === '/trust' || command === '/approve') {
              if (!(await requireWritePermission())) return;
            }

            if (command === '/ban' || command === '/trust') {
              const mention = body.match(/@([A-Za-z0-9-]+)/)?.[1];
              const user = mention || issueUser;

              if (command === '/ban') {
                if (!policy.bannedUsers.includes(user)) policy.bannedUsers.push(user);
                policy.trustedUsers = policy.trustedUsers.filter((entry) => entry !== user);
                core.setOutput('message', `🚫 @${user} is now banned from addon creation/update requests in this repository.`);
                core.setOutput('close', 'true');
              } else {
                if (!policy.trustedUsers.includes(user)) policy.trustedUsers.push(user);
                policy.bannedUsers = policy.bannedUsers.filter((entry) => entry !== user);
                core.setOutput('message', `✅ @${user} is now trusted; their addon update requests will be approved automatically.`);

                const canApplyCurrent = requestType === 'update' && user === issueUser;
                if (canApplyCurrent) {
                  const result = validateUpdate(issueBody, { user, trusted: true, banned: false });
                  if (result.errors.length === 0) {
                    core.setOutput('apply', 'true');
                    core.setOutput('close', 'true');
                    core.setOutput('message', `✅ @${user} is now trusted, and this addon update was automatically approved and applied.`);
                  }
                }
              }

              policy.bannedUsers.sort((a, b) => a.localeCompare(b));
              policy.trustedUsers.sort((a, b) => a.localeCompare(b));
              fs.writeFileSync(policyPath, `${JSON.stringify(policy, null, 2)}\n`);
              core.setOutput('commit_policy', 'true');
              return;
            }

            if (policy.bannedUsers.includes(issueUser)) {
              core.setFailed(`@${issueUser} is banned from addon requests.`);
              return;
            }

            if (command === '/bump') {
              if (commenter !== issueUser) {
                core.setFailed('Only the issue creator can use /bump.');
                return;
              }
              const requested = body.replace(/^\/bump\s*/i, '').trim();
              const nextBody = replaceTargetRef(issueBody, requested);
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                body: nextBody,
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                body: `🔁 Requested target ref bumped to \`${requested}\`.`,
              });
              return;
            }

            if (command === '/approve') {
              core.setOutput('apply', 'true');
              core.setOutput('close', 'true');
              core.setOutput('message', '✅ Approved and applied. The marketplace file was updated, and deployment should start from the pushed commit.');
            }

      - name: Commit request policy
        if: steps.command.outputs.commit_policy == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/addon-request-policy.json
          if git diff --cached --quiet; then
            echo "Policy already up to date."
            exit 0
          fi
          git commit -m "chore(addon requests): update trust policy"
          git push

      - name: Apply marketplace change
        if: steps.command.outputs.apply == 'true'
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_LABELS: ${{ join(github.event.issue.labels.*.name, ',') }}
        run: node scripts/addon-request.cjs apply-by-label

      - name: Commit marketplace change
        if: steps.command.outputs.apply == 'true'
        run: |
          node scripts/update-addon-issue-template.mjs
          node scripts/sync-pages-api.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add marketplace.json api/marketplace.json .github/ISSUE_TEMPLATE/addon-update.yml
          git commit -m "chore(addons): apply marketplace request from issue #${{ github.event.issue.number }}"
          git push

      - name: Comment and close
        if: steps.command.outputs.message != ''
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `${{ steps.command.outputs.message }}`,
            });
            if ('${{ steps.command.outputs.close }}' === 'true') {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                state: 'closed',
              });
            }
