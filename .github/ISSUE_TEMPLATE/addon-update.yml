name: Addon update request
description: Request an update to an existing OpenGameInstaller marketplace addon
title: "Update addon"
labels:
  - addon-update
body:
  - type: markdown
    attributes:
      value: |
        Use this form to request that an existing marketplace addon points to a new commit, tag, or version. After opening the issue, the issue creator or addon owner can update details by commenting `/set-name`, `/set-author`, `/set-description`, `/set-repository`, `/set-image`, or `/bump`.

  - type: dropdown
    id: addon_id
    attributes:
      label: Addon ID
      description: Select the addon ID inferred from marketplace.json.
      # BEGIN GENERATED ADDON ID OPTIONS - run `node scripts/update-addon-issue-template.mjs`
      options:
        - "no-addons-available"
      default: 0
      # END GENERATED ADDON ID OPTIONS
    validations:
      required: true

  - type: input
    id: target_ref
    attributes:
      label: Target commit, tag, or branch (optional; defaults to latest tag)
      description: Leave blank to use the latest created tag, or enter a commit, tag, or branch.
    validations:
      required: false

  - type: textarea
    id: update_notes
    attributes:
      label: Update notes
      description: What changed in this addon update?
      placeholder: Fixes setup script and updates metadata.
    validations:
      required: true

  - type: checkboxes
    id: confirmation
    attributes:
      label: Confirmation
      options:
        - label: I confirm this update is for the repository above and is ready for maintainer review.
          required: true
