name: Addon update request
description: Request an update to an existing OpenGameInstaller marketplace addon
title: "Update addon: <addon id>"
labels:
  - addon-update
body:
  - type: markdown
    attributes:
      value: |
        Use this form to request that an existing marketplace addon points to a new commit, tag, or version.

  - type: dropdown
    id: addon_id
    attributes:
      label: Addon ID
      description: Select the addon ID inferred from marketplace.json.
      # BEGIN GENERATED ADDON ID OPTIONS - run `node scripts/update-addon-issue-template.mjs`
      options:
        - "steam-integration"
      default: 0
      # END GENERATED ADDON ID OPTIONS
    validations:
      required: true

  - type: input
    id: target_ref
    attributes:
      label: Target commit, tag, or branch (optional; defaults to latest tag)
      description: Prefer a full commit SHA for reproducible marketplace updates.
    validations:
      required: false

  - type: textarea
    id: update_notes
    attributes:
      label: Update notes
      description: What changed in this addon update?
      placeholder: Fixes setup script and updates metadata.
    validations:
      required: true

  - type: checkboxes
    id: confirmation
    attributes:
      label: Confirmation
      options:
        - label: I confirm this update is for the repository above and is ready for maintainer review.
          required: true
